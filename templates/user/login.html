<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>用户登录 - 天天生鲜</title>
    <link rel="stylesheet" href="/static/css/reset.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            background: #f5f5f5;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .login_con {
            width: 400px;
            margin: 80px auto;
            padding: 40px;
            background: #fff;
            border-radius: 4px;
        }
        .login_con h2 {
            text-align: center;
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .form_group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .form_group label {
            width: 80px;
            text-align: right;
            padding-right: 15px;
            font-size: 14px;
            color: #666;
        }
        .form_group input[type="text"],
        .form_group input[type="password"],
        .form_group input[type="email"] {
            flex: 1;
            height: 36px;
            padding: 0 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            outline: none;
        }
        .form_group input[type="text"]:focus,
        .form_group input[type="password"]:focus,
        .form_group input[type="email"]:focus {
            border-color: #37ab40;
        }
        .form_group input[type="checkbox"] {
            width: auto;
            height: auto;
            margin-right: 5px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #666;
            width: auto;
            text-align: left;
            padding: 0;
            flex: none;
        }
        .checkbox-label input[type="checkbox"] {
            width: auto;
            height: auto;
            margin-right: 8px;
        }
        .error_msg {
            margin-left: 95px;
            color: #f00;
            font-size: 12px;
            margin-top: -10px;
            margin-bottom: 10px;
        }
        .submit_btn {
            display: block;
            width: 100%;
            height: 40px;
            background: #37ab40;
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit_btn:hover {
            background: #2d9232;
        }
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 14px;
        }
        .links a {
            color: #37ab40;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .msg_box {
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .msg_box.error {
            color: #f00;
        }
    </style>
</head>
<body>
    <div class="login_con">
        <h2>用户登录</h2>

        {% if error %}
            <div class="msg_box error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form_group">
                <label>用户名</label>
                <input type="text" name="username" required>
            </div>

            <div class="form_group">
                <label>密码</label>
                <input type="password" name="password" required>
            </div>

            <div class="form_group" style="padding-left: 80px;">
                <input type="checkbox" name="remember" id="remember" style="width:auto; margin-right:5px;">
                <label for="remember" style="font-size:14px; color:#666; cursor:pointer;">记住用户名</label>
            </div>

            <input type="submit" value="登 录" class="submit_btn">
        </form>

        <div class="links">
            <a href="{% url 'user:register' %}">立即注册</a>
            <a href="{% url 'user:forget_password' %}">忘记密码？</a>
        </div>
    </div>
</body>
</html>
