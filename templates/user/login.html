<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
</head>
<body>
    <p><a href="/index/">首页</a> | <a href="{% url 'user:register' %}">注册</a></p>
    <h2>登录</h2>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}
    {% if form.errors %}
    <ul style="color: red;">
        {% for field, errors in form.errors.items %}
            {% for error in errors %}
                <li>{{ error }}</li>
            {% endfor %}
        {% endfor %}
    </ul>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">登录</button>
    </form>
    <p>没有账号？<a href="{% url 'user:register' %}">立即注册</a></p>
</body>
</html>
