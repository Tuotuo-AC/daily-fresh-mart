<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>忘记密码 - 天天生鲜</title>
    <link rel="stylesheet" href="/static/css/reset.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            background: #f5f5f5;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .forget_con {
            width: 400px;
            margin: 80px auto;
            padding: 40px;
            background: #fff;
            border-radius: 4px;
        }
        .forget_con h2 {
            text-align: center;
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .form_group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .form_group label {
            width: 80px;
            text-align: right;
            padding-right: 15px;
            font-size: 14px;
            color: #666;
        }
        .form_group input {
            flex: 1;
            height: 36px;
            padding: 0 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            outline: none;
        }
        .form_group input:focus {
            border-color: #37ab40;
        }
        .submit_btn {
            display: block;
            width: 100%;
            height: 40px;
            background: #37ab40;
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
        .submit_btn:hover {
            background: #2d9232;
        }
        .msg_box {
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .msg_box.error {
            color: #f00;
        }
        .msg_box.success {
            color: #37ab40;
        }
        .login_link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .login_link a {
            color: #37ab40;
            text-decoration: none;
        }
        .login_link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="forget_con">
        <h2>忘记密码</h2>

        {% if error %}
            <div class="msg_box error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="msg_box success">
                验证码已发送到您的邮箱<br>
                请查看控制台获取验证码
            </div>
            <p style="text-align: center; margin-bottom: 20px; color: #666;">
                验证码有效期为10分钟
            </p>
            <form method="get" action="{% url 'user:reset_password' %}">
                <input type="hidden" name="email" value="{{ email }}">
                <input type="submit" value="下一步：输入验证码" class="submit_btn">
            </form>
        {% else %}
            <form method="post">
                {% csrf_token %}

                <div class="form_group">
                    <label>邮箱</label>
                    <input type="email" name="email" value="{{ email|default:'' }}" required>
                </div>

                <input type="submit" value="发送验证码" class="submit_btn">
            </form>
        {% endif %}

        <div class="login_link">
            <a href="{% url 'user:login' %}">返回登录</a>
        </div>
    </div>
</body>
</html>
