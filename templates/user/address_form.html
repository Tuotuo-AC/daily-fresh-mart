<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} - 天天生鲜</title>
    <link rel="stylesheet" href="/static/css/reset.css">
    <style>
        body {
            background: #f5f5f5;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .header {
            background: #37ab40;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
        }
        .header a:hover {
            color: #ff8800;
        }
        .container {
            width: 600px;
            margin: 30px auto;
            background: #fff;
            padding: 30px;
            border-radius: 4px;
        }
        .container h2 {
            font-size: 20px;
            color: #333;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
            margin-bottom: 25px;
        }
        .form_group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .form_group label {
            width: 100px;
            text-align: right;
            padding-right: 15px;
            font-size: 14px;
            color: #666;
        }
        .form_group input,
        .form_group select {
            flex: 1;
            height: 36px;
            padding: 0 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            outline: none;
        }
        .form_group input:focus,
        .form_group select:focus {
            border-color: #37ab40;
        }
        .form_group label.inline {
            width: auto;
            text-align: left;
            padding: 0;
            display: flex;
            align-items: center;
        }
        .form_group label.inline input {
            width: auto;
            height: auto;
            margin-right: 8px;
        }
        .submit_btn {
            display: block;
            width: 200px;
            height: 40px;
            background: #37ab40;
            color: #fff;
            border: none;
            font-size: 16px;
            cursor: pointer;
            margin: 30px auto 0;
        }
        .submit_btn:hover {
            background: #2d9232;
        }
        .back_link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #37ab40;
            text-decoration: none;
        }
        .back_link:hover {
            text-decoration: underline;
        }
        .error_msg {
            color: #f00;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <a href="/">首页</a>
        </div>
        <div>
            <a href="{% url 'user:profile' %}">个人中心</a>
            <a href="{% url 'user:address_list' %}">地址管理</a>
            <a href="{% url 'user:logout' %}">退出登录</a>
        </div>
    </div>

    <div class="container">
        <h2>{{ title }}</h2>

        {% if form.errors %}
            {% for field, errors in form.errors.items %}
                {% for error in errors %}
                    <div class="error_msg">{{ error }}</div>
                {% endfor %}
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form_group">
                <label>收货人</label>
                <input type="text" name="receiver" value="{{ form.receiver.value|default:'' }}" required>
            </div>

            <div class="form_group">
                <label>手机号</label>
                <input type="text" name="mobile" value="{{ form.mobile.value|default:'' }}" maxlength="11" required>
            </div>

            <div class="form_group">
                <label>省</label>
                <input type="text" name="province" value="{{ form.province.value|default:'' }}" required>
            </div>

            <div class="form_group">
                <label>市</label>
                <input type="text" name="city" value="{{ form.city.value|default:'' }}" required>
            </div>

            <div class="form_group">
                <label>区</label>
                <input type="text" name="district" value="{{ form.district.value|default:'' }}" required>
            </div>

            <div class="form_group">
                <label>详细地址</label>
                <input type="text" name="detail" value="{{ form.detail.value|default:'' }}" required>
            </div>

            <div class="form_group">
                <label class="inline">
                    <input type="checkbox" name="is_default" {% if form.is_default.value %}checked{% endif %}>
                    设为默认地址
                </label>
            </div>

            <input type="submit" value="保存" class="submit_btn">
        </form>

        <a href="{% url 'user:address_list' %}" class="back_link">返回地址列表</a>
    </div>
</body>
</html>
